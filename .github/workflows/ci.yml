name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        run: dotnet restore src/backend/TickerTime.Api.Tests/TickerTime.Api.Tests.csproj

      - name: Test backend
        run: dotnet test src/backend/TickerTime.Api.Tests/TickerTime.Api.Tests.csproj --configuration Release --no-restore

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend/ticker-time-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/frontend/ticker-time-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
